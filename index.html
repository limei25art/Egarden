<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小蒼的無盡冒險 - Sora Run (新擬物 UI)</title>
    <style>
        /* ==================== 新擬物風格顏色變數 ==================== */
        :root {
            --bg-color: #E0E5EC;
            --text-main: #5A6C7D;
            --text-highlight: #4CAF50;
            --text-warning: #FF9800;
            --text-danger: #E65100;
            
            /* 凸起陰影 (外凸) */
            --shadow-flat: 
                -5px -5px 10px rgba(255, 255, 255, 0.8),
                 5px  5px 10px rgba(0, 0, 0, 0.1);
                 
            /* 凹陷陰影 (內凹) */
            --shadow-inset: 
                inset  2px  2px 5px rgba(0, 0, 0, 0.1),
                inset -2px -2px 5px rgba(255, 255, 255, 0.8);
                
            /* 文字微凸起效果 */
            --text-shadow-neo: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            /* 背景改為新擬物的底色，為了讓陰影效果明顯 */
            background: var(--bg-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            touch-action: none;
            user-select: none;
            color: var(--text-main);
        }

        /* 遊戲容器本身保留原本風格 (因為裡面有畫布)，但外框加上新擬物特徵 */
        #game-container {
            position: relative;
            background: linear-gradient(to bottom, #fca34d, #fcd394);
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            /* 調整容器外框陰影，配合整體風格 */
            box-shadow: var(--shadow-flat);
            overflow: hidden;
            border-radius: 20px;
            /* 給容器加一個不明顯的邊框增加質感 */
            border: 2px solid rgba(255,255,255,0.2); 
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            image-rendering: pixelated;
        }

        /* 頂部 UI 稍微調整文字陰影以適應遊戲背景 */
        #ui {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between;
            font-size: 20px; font-weight: bold; color: #fff; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }

        /* ==================== 結算 Popup (新擬物化) ==================== */
        #popup {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* 背景調淡，不要太黑，讓新擬物的光影透出來 */
            background: rgba(224, 229, 236, 0.85);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 20; backdrop-filter: blur(8px);
        }

        .popup-content {
            background: var(--bg-color);
            padding: 30px 25px; 
            border-radius: 20px; /* 大圓角 */
            text-align: center; 
            width: 85%; max-width: 340px;
            box-sizing: border-box;
            
            /* 新擬物核心：無明顯邊框，靠雙陰影塑造形狀 */
            border: none;
            box-shadow: var(--shadow-flat);
            animation: neoBounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes neoBounceIn {
            from { transform: scale(0.8) translateY(20px); opacity: 0; box-shadow: none; }
            to { transform: scale(1) translateY(0); opacity: 1; box-shadow: var(--shadow-flat); }
        }

        h2 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 26px; 
            margin-bottom: 15px; 
            text-shadow: var(--text-shadow-neo);
            font-weight: 600;
        }
        
        p { 
            font-size: 16px; 
            margin: 10px 0; 
            color: var(--text-main);
            text-shadow: var(--text-shadow-neo);
        }

        .highlight { 
            color: var(--text-warning); 
            font-weight: bold; 
            font-size: 22px; 
        }
        
        #result-tier-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--text-danger);
            margin: 15px 0 10px 0;
            text-shadow: var(--text-shadow-neo);
        }

        /* 圖片外框改為凹陷效果 */
        #result-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%; /* 圓形圖片更適合新擬物 */
            border: 4px solid var(--bg-color); /* 邊框與背景同色 */
            margin: 10px auto;
            display: block;
            background: var(--bg-color);
            /* 使用內凹陰影 */
            box-shadow: var(--shadow-inset);
            padding: 5px; /* 留出內凹空間 */
        }
        
        #ai-comment {
            font-style: normal;
            color: #7A8C9D; /* 稍微淺一點的文字 */
            margin-top: 15px;
            min-height: 35px;
            font-size: 14px;
            /* 給評論區塊一個微微凹陷的底框 */
            padding: 10px;
            border-radius: 12px;
            box-shadow: var(--shadow-inset);
            background: rgba(255,255,255,0.1);
        }

        /* ==================== 按鈕 (新擬物化) ==================== */
        .btn-restart {
            margin-top: 20px; 
            padding: 12px 35px; 
            font-size: 18px; 
            font-weight: bold;
            color: var(--text-main);
            background: var(--bg-color); /* 與背景同色 */
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            
            /* 預設為凸起 */
            box-shadow: var(--shadow-flat);
            text-shadow: var(--text-shadow-neo);
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-restart:hover {
            /* 懸停時顏色微調 */
            color: var(--text-highlight);
        }

        .btn-restart:active {
            /* 按下時切換為凹陷效果 */
            transform: scale(0.98);
            box-shadow: var(--shadow-inset);
            color: var(--text-main);
        }
        /* ======================================================== */

        #start-prompt {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            text-align: center; pointer-events: none; z-index: 10;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-anim {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .score-popup {
            position: absolute;
            color: #FFD700;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 2px 2px 0px #b8860b, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
            pointer-events: none;
            z-index: 15;
            transform: translate(-50%, -50%);
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% { margin-top: 0; opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            20% { transform: translate(-50%, -50%) scale(1.2); }
            100% { margin-top: -80px; opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes popScore {
            0% { transform: scale(1); color: #fff; }
            50% { transform: scale(1.6); color: #FFD700; }
            100% { transform: scale(1); color: #fff; }
        }
        .pop-anim {
            display: inline-block;
            animation: popScore 0.3s ease-out;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>🪙 GOLD: <span id="score" style="display:inline-block; transition: all 0.1s;">0</span></div>
        <div>⏱️ TIME: <span id="timer">0.0</span>s</div>
    </div>
    
    <div id="start-prompt">
        <div style="font-size: 32px; color: #FFD700; text-shadow: 2px 2px 0px #b8860b; margin-bottom: 20px;">Sora Run</div>
        <div>點擊螢幕 開始冒險</div>
        <div style="font-size: 14px; margin-top: 8px; color: #ffe0b2;">長按可跳得更高！</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="popup">
        <div class="popup-content">
            <h2>冒險結果</h2>
            <img id="result-img" src="" alt="冒險結果">
            <div id="result-tier-title">🔹 稱號載入中 🔹</div>
            
            <p>收集金幣：<span id="finalScore" class="highlight">0</span></p>
            <p>奔跑時間：<span id="finalTime" class="highlight">0</span> 秒</p>
            <p id="ai-comment">✨ 正在請 AI 評價你的表現...</p>
            <button class="btn-restart" id="btn-restart">再次挑戰</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const popup = document.getElementById('popup');
    const startPrompt = document.getElementById('start-prompt');
    const aiCommentEl = document.getElementById('ai-comment');
    const btnRestart = document.getElementById('btn-restart');

    const WIDTH = 720;
    const HEIGHT = 1280;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    const GROUND_H = 180;
    const GROUND_Y = HEIGHT - GROUND_H;
    const HITBOX_SHRINK = 10;

    let gameState = 'ready';
    let score = 0;
    let startTime = 0;
    let gameTime = 0;
    let gameSpeed = 7;
    let baseSpeed = 7;
    let frames = 0;
    
    let obstacles = [];
    let coins = [];
    let particles = [];
    
    let playerSheet = new Image();
    let bgImage = new Image();
    let obstacleImg = new Image();
    let coinImg = new Image();
    let groundTile = new Image();

    let imagesLoaded = 0;
    const totalImages = 5;

    function checkAllLoaded() {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
            console.log("✅ 所有遊戲圖片載入完成");
            if (gameState === 'ready') {
                renderScene(); 
            }
        }
    }

    playerSheet.src = "assets/sora_spritesheet.png";   
    bgImage.src = "assets/Background.png";           
    obstacleImg.src = "assets/obstacle.png";       
    coinImg.src = "assets/coin.png";             
    groundTile.src = "assets/Ground_Tile.png";      

    playerSheet.onload = checkAllLoaded;
    bgImage.onload = checkAllLoaded;
    obstacleImg.onload = checkAllLoaded;
    coinImg.onload = checkAllLoaded;
    groundTile.onload = checkAllLoaded;

    const resultTiers = [
        { min: 0, max: 0, title: "🍂 空手而回 🍂", img: "assets/result_0.png", comment: "居然一個金幣都沒拿到，小蒼在風中凌亂了..." },
        { min: 1, max: 5, title: "🥉 初試身手 🥉", img: "assets/result_1.png", comment: "小有收穫！繼續熟悉跳躍節奏，下次會更好！" },
        { min: 6, max: 15, title: "🥈 尋寶能手 🥈", img: "assets/result_2.png", comment: "身手相當敏捷，輕輕鬆鬆把金幣收入囊中！" },
        { min: 16, max: 30, title: "🥇 金幣收割者 🥇", img: "assets/result_3.png", comment: "太厲害了！場上的金幣幾乎被你一掃而空！" },
        { min: 31, max: 50, title: "💎 大富大貴 💎", img: "assets/result_4.png", comment: "財源滾滾！小蒼這波冒險直接原地財富自由！" },
        { min: 51, max: 99, title: "👑 富可敵國 👑", img: "assets/result_5.png", comment: "神級操作！滿屏的金幣都在為你的技術起舞！" },
        { min: 100, max: Infinity, title: "✨ 傳奇終結者 ✨", img: "assets/result_6.png", comment: "不可思議！你打破了小蒼冒險的最高財富紀錄！" }
    ];

    const player = {
        x: 100,
        y: GROUND_Y,
        width: 100,
        height: 160,
        vy: 0,
        gravity: 1.1,
        jumpPower: -23,
        isJumping: false,
        jumpHoldTimer: 0,
        maxJumpHold: 12,
        animFrame: 0,
        animTimer: 0,
        state: 'RUN',

        update: function() {
            if (isPressing && this.jumpHoldTimer > 0) {
                this.vy -= 0.8;
                this.jumpHoldTimer--;
            }
            this.vy += this.gravity;
            this.y += this.vy;

            if (this.y >= GROUND_Y) {
                this.y = GROUND_Y;
                this.vy = 0;
                if (this.isJumping) {
                    this.isJumping = false;
                    this.state = 'LAND';
                    this.animFrame = 0;
                    this.animTimer = 0;
                }
            }

            if (!this.isJumping) {
                if (this.state === 'LAND') {
                    this.animTimer += 0.3;
                    if (this.animTimer >= 1) {
                        this.state = 'RUN';
                        this.animTimer = 0;
                    }
                } else {
                    this.state = 'RUN';
                    this.animTimer += (gameSpeed * 0.02);
                    this.animFrame = Math.floor(this.animTimer) % 8;
                }
            } else {
                this.state = this.vy < 0 ? 'JUMP_UP' : 'FALL';
            }
        },

        draw: function() {
            if (!playerSheet.complete) {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FF9800';
                ctx.fillStyle = '#FF9800';
                ctx.beginPath();
                ctx.roundRect(this.x, this.y - this.height, this.width, this.height, 15);
                ctx.fill();
                ctx.restore();
                return;
            }

            let sx = 0, sy = 0, sw = 90, sh = 175;
            if (this.state === 'RUN') {
                const runFramesX = [148, 260, 368, 478, 595, 715, 830, 935];
                sx = runFramesX[this.animFrame];
                sy = 196;
            } else if (this.state === 'JUMP_UP') {
                sx = 368; sy = 485;
            } else if (this.state === 'FALL') {
                sx = 595; sy = 485;
            } else if (this.state === 'LAND') {
                sx = 880; sy = 525; sh = 140;
            } else {
                sx = 48; sy = 196;
            }
            ctx.drawImage(playerSheet, sx, sy, sw, sh, this.x, this.y - this.height, this.width, this.height);
        }
    };

    class StarBg {
        constructor() {
            this.x = Math.random() * WIDTH;
            this.y = Math.random() * (HEIGHT - GROUND_H - 200);
            this.size = Math.random() * 3 + 1;
            this.speed = Math.random() * 0.5 + 0.1;
        }
        update() { this.x -= this.speed; if (this.x < -10) this.x = WIDTH + 10; }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }
    let bgStars = Array.from({length: 40}, () => new StarBg());

    let isPressing = false;

    function pressStart(e) {
        if (e.type === 'touchstart') e.preventDefault();
        
        if (gameState === 'ready') {
            gameState = 'playing';
            startPrompt.style.display = 'none';
            startTime = Date.now();
            requestAnimationFrame(gameLoop);
            return;
        }
        
        if (gameState === 'playing') {
            isPressing = true;
            if (!player.isJumping) {
                player.isJumping = true;
                player.vy = player.jumpPower;
                player.jumpHoldTimer = player.maxJumpHold;
            }
        }
    }

    function pressEnd(e) {
        if (e.type === 'touchend') e.preventDefault();
        isPressing = false;
        player.jumpHoldTimer = 0;
    }

    canvas.addEventListener('touchstart', pressStart, {passive: false});
    canvas.addEventListener('touchend', pressEnd, {passive: false});
    canvas.addEventListener('mousedown', pressStart);
    canvas.addEventListener('mouseup', pressEnd);

    class Obstacle {
        constructor() {
            this.width = 80;
            this.height = 100;
            this.x = WIDTH + 100;
            this.y = GROUND_Y;
        }
        update() { this.x -= gameSpeed; }
        draw() {
            if (obstacleImg.complete) {
                ctx.drawImage(obstacleImg, this.x, this.y - this.height, this.width, this.height);
            } else {
                ctx.fillStyle = '#ff2a2a';
                ctx.fillRect(this.x, this.y - this.height, this.width, this.height);
            }
        }
    }

    class Coin {
        constructor() {
            this.size = 40;
            this.x = WIDTH + 100;
            const heights = [GROUND_Y - 50, GROUND_Y - 180, GROUND_Y - 290];
            this.y = heights[Math.floor(Math.random() * heights.length)];
            this.angle = Math.random() * Math.PI;
        }
        update() {
            this.x -= gameSpeed;
            this.angle += 0.08;
        }
        draw() {
            if (coinImg.complete) {
                ctx.drawImage(coinImg, this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            } else {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FFD700';
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size / 2 * Math.sin(this.angle), this.size / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8 - 4;
            this.size = Math.random() * 6 + 3;
            this.color = color;
            this.life = 1.0;
            this.decay = Math.random() * 0.03 + 0.02;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vy += 0.2; this.life -= this.decay;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    function triggerCSSScorePopup(canvasX, canvasY) {
        const scaleX = gameContainer.clientWidth / WIDTH;
        const scaleY = gameContainer.clientHeight / HEIGHT;

        const floatEl = document.createElement('div');
        floatEl.className = 'score-popup';
        floatEl.innerText = '+1';
        
        floatEl.style.left = (canvasX * scaleX) + 'px';
        floatEl.style.top = (canvasY * scaleY) + 'px';
        
        gameContainer.appendChild(floatEl);

        scoreEl.classList.remove('pop-anim');
        void scoreEl.offsetWidth; 
        scoreEl.classList.add('pop-anim');

        setTimeout(() => floatEl.remove(), 800);
    }

    function gameLoop() {
        if (gameState !== 'playing') return;

        frames++;
        gameTime = (Date.now() - startTime) / 1000;
        timerEl.innerText = gameTime.toFixed(1);
        gameSpeed = Math.min(baseSpeed + (gameTime / 8) * 1.2, 18);

        bgStars.forEach(star => star.update());
        player.update();

        let spawnInterval = Math.max(65, 120 - Math.floor(gameSpeed * 2.5));
        if (frames % spawnInterval === 0) {
            obstacles.push(new Obstacle());
            if (Math.random() < 0.7) coins.push(new Coin());
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.update();
            if (player.x + HITBOX_SHRINK < obs.x + obs.width - 10 &&
                player.x + player.width - HITBOX_SHRINK > obs.x + 10 &&
                player.y - player.height + HITBOX_SHRINK < obs.y &&
                player.y > obs.y - obs.height + 10) {
                triggerGameOver();
            }
            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            let coin = coins[i];
            coin.update();
            if (player.x < coin.x + coin.size &&
                player.x + player.width > coin.x - coin.size &&
                player.y - player.height < coin.y + coin.size &&
                player.y > coin.y - coin.size) {
                
                score += 1;
                scoreEl.innerText = score;
                
                triggerCSSScorePopup(coin.x, coin.y);
                
                for (let p = 0; p < 4; p++) particles.push(new Particle(coin.x, coin.y, '#FFD700'));
                coins.splice(i, 1);
            } else if (coin.x + coin.size < 0) {
                coins.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        renderScene();
        requestAnimationFrame(gameLoop);
    }

    function renderScene() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        if (bgImage.complete) {
            ctx.drawImage(bgImage, 0, 0, WIDTH, HEIGHT - GROUND_H + 50);
        }

        bgStars.forEach(star => star.draw());

        if (groundTile.complete) {
            let offset = (frames * gameSpeed) % 120;
            for (let i = -120; i < WIDTH + 240; i += 120) {
                ctx.drawImage(groundTile, i - offset, GROUND_Y, 120, GROUND_H);
            }
        } else {
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(0, GROUND_Y, WIDTH, GROUND_H);
        }

        coins.forEach(coin => coin.draw());
        obstacles.forEach(obs => obs.draw());
        player.draw();
        particles.forEach(p => p.draw());
    }

    function triggerGameOver() {
        gameState = 'gameover';
        
        gameContainer.classList.add('shake-anim');
        setTimeout(() => gameContainer.classList.remove('shake-anim'), 400);

        let matchedTier = resultTiers[0];
        for (const tier of resultTiers) {
            if (score >= tier.min && score <= tier.max) {
                matchedTier = tier;
                break;
            }
        }

        document.getElementById('result-tier-title').innerText = matchedTier.title;
        document.getElementById('result-img').src = matchedTier.img;

        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalTime').innerText = gameTime.toFixed(1);
        popup.style.display = 'flex';
        
        for (let p = 0; p < 25; p++) {
            particles.push(new Particle(player.x + player.width/2, player.y - player.height/2, '#FF5722'));
        }
        renderScene();
        
        aiCommentEl.innerText = `✨ ${matchedTier.comment}`;
    }

    function resetGame() {
        popup.style.display = 'none';
        player.y = GROUND_Y;
        player.vy = 0;
        player.isJumping = false;
        obstacles = [];
        coins = [];
        particles = [];
        score = 0;
        scoreEl.innerText = '0';
        frames = 0;
        gameState = 'ready';
        startPrompt.style.display = 'block';
        renderScene();
    }

    btnRestart.addEventListener('click', resetGame);

    renderScene();
</script>
</body>
</html>
