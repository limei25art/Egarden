<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小蒼的無盡冒險 - Sora Run</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            background: linear-gradient(to bottom, #fca34d, #fcd394);
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-height: 100vh;
            max-width: calc(100vh * 9 / 16);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            border-radius: 12px;
        }

        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            image-rendering: pixelated;
        }

        #ui {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between;
            font-size: 20px; font-weight: bold; color: #fff; 
            text-shadow: 2px 2px 0px #000, -1px -1px 0px #000, 1px -1px 0px #000, -1px 1px 0px #000;
            pointer-events: none;
            z-index: 10;
        }

        #popup {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 20; backdrop-filter: blur(4px);
        }

        .popup-content {
            background: #fff; padding: 30px; border-radius: 16px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 80%; max-width: 320px;
            border: 4px solid #FF9800;
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            from { transform: scale(0.3); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h2 { margin-top: 0; color: #E65100; font-size: 28px; }
        p { font-size: 18px; margin: 12px 0; color: #444; }
        .highlight { color: #FF9800; font-weight: bold; font-size: 24px; }
        
        #ai-comment {
            font-style: italic;
            color: #555;
            margin-top: 15px;
            min-height: 40px;
        }

        .btn-restart {
            margin-top: 15px; padding: 12px 30px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 30px; background: #4CAF50; color: white;
            cursor: pointer; box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4);
        }
        .btn-restart:active { transform: scale(0.95); }

        #start-prompt {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; font-weight: bold; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            text-align: center; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div>🪙 GOLD: <span id="score">0</span></div>
        <div>⏱️ TIME: <span id="timer">0.0</span>s</div>
    </div>
    
    <div id="start-prompt">
        <div>點擊螢幕 跳躍</div>
        <div style="font-size: 14px; margin-top: 8px; color: #ffe0b2;">長按可跳得更高！</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="popup">
        <div class="popup-content">
            <h2>冒險結束</h2>
            <p>收集金幣：<span id="finalScore" class="highlight">0</span></p>
            <p>奔跑時間：<span id="finalTime" class="highlight">0</span> 秒</p>
            <p id="ai-comment">✨ 正在請 AI 評價你的表現...</p>
            <button class="btn-restart" id="btn-restart">再次挑戰</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const popup = document.getElementById('popup');
    const startPrompt = document.getElementById('start-prompt');
    const aiCommentEl = document.getElementById('ai-comment');
    const btnRestart = document.getElementById('btn-restart');

    const WIDTH = 720;
    const HEIGHT = 1280;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    const GROUND_H = 180;
    const GROUND_Y = HEIGHT - GROUND_H;
    const HITBOX_SHRINK = 10;

    // 遊戲變數
    let gameState = 'ready';
    let score = 0;
    let startTime = 0;
    let gameTime = 0;
    let gameSpeed = 7;
    let baseSpeed = 7;
    let frames = 0;
    
    let obstacles = [];
    let coins = [];
    let particles = [];
    
    // 內部圖片資源（請替換成你自己的圖片網址）
    let playerSheet = new Image();    // 主角精靈表
    let bgImage = new Image();        // 背景圖
    let obstacleImg = new Image();    // 障礙物
    let coinImg = new Image();        // 金幣
    let groundTile = new Image();     // 地面紋理

    let imagesLoaded = 0;
    const totalImages = 5;

    function checkAllLoaded() {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
            console.log("✅ 所有遊戲圖片載入完成");
        }
    }

    // ==================== 修改這裡 ====================
    playerSheet.src = "assets/sora_spritesheet.png";   // 推薦 1200x800
    bgImage.src = "assets/Background.png";           // 推薦 1440x800
    obstacleImg.src = "assets/obstacle.png";       // 推薦 120x160
    coinImg.src = "assets/coin.png";             // 推薦 80x80
    groundTile.src = "assets/Ground_Tile.png";      // 推薦 120x180
    // ================================================

    playerSheet.onload = checkAllLoaded;
    bgImage.onload = checkAllLoaded;
    obstacleImg.onload = checkAllLoaded;
    coinImg.onload = checkAllLoaded;
    groundTile.onload = checkAllLoaded;

    // 角色
    const player = {
        x: 100,
        y: GROUND_Y,
        width: 100,
        height: 160,
        vy: 0,
        gravity: 1.1,
        jumpPower: -23,
        isJumping: false,
        jumpHoldTimer: 0,
        maxJumpHold: 12,
        animFrame: 0,
        animTimer: 0,
        state: 'RUN',

        update: function() {
            if (isPressing && this.jumpHoldTimer > 0) {
                this.vy -= 0.8;
                this.jumpHoldTimer--;
            }
            this.vy += this.gravity;
            this.y += this.vy;

            if (this.y >= GROUND_Y) {
                this.y = GROUND_Y;
                this.vy = 0;
                if (this.isJumping) {
                    this.isJumping = false;
                    this.state = 'LAND';
                    this.animFrame = 0;
                    this.animTimer = 0;
                }
            }

            if (!this.isJumping) {
                if (this.state === 'LAND') {
                    this.animTimer += 0.3;
                    if (this.animTimer >= 1) {
                        this.state = 'RUN';
                        this.animTimer = 0;
                    }
                } else {
                    this.state = 'RUN';
                    this.animTimer += (gameSpeed * 0.02);
                    this.animFrame = Math.floor(this.animTimer) % 8;
                }
            } else {
                this.state = this.vy < 0 ? 'JUMP_UP' : 'FALL';
            }
        },

        draw: function() {
            if (!playerSheet.complete) {
                // 備用顯示
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FF9800';
                ctx.fillStyle = '#FF9800';
                ctx.beginPath();
                ctx.roundRect(this.x, this.y - this.height, this.width, this.height, 15);
                ctx.fill();
                ctx.restore();
                return;
            }

            let sx = 0, sy = 0, sw = 90, sh = 175;

            if (this.state === 'RUN') {
                const runFramesX = [148, 260, 368, 478, 595, 715, 830, 935];
                sx = runFramesX[this.animFrame];
                sy = 196;
            } else if (this.state === 'JUMP_UP') {
                sx = 368; sy = 485;
            } else if (this.state === 'FALL') {
                sx = 595; sy = 485;
            } else if (this.state === 'LAND') {
                sx = 880; sy = 525; sh = 140;
            } else {
                sx = 48; sy = 196;
            }

            ctx.drawImage(playerSheet, sx, sy, sw, sh, this.x, this.y - this.height, this.width, this.height);
        }
    };

    // 背景星星
    class StarBg {
        constructor() {
            this.x = Math.random() * WIDTH;
            this.y = Math.random() * (HEIGHT - GROUND_H - 200);
            this.size = Math.random() * 3 + 1;
            this.speed = Math.random() * 0.5 + 0.1;
        }
        update() { this.x -= this.speed; if (this.x < -10) this.x = WIDTH + 10; }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    bgStars = Array.from({length: 40}, () => new StarBg());

    // 輸入控制
    let isPressing = false;

    function pressStart(e) {
        if (e.type === 'touchstart') e.preventDefault();
        
        if (gameState === 'ready') {
            gameState = 'playing';
            startPrompt.style.display = 'none';
            startTime = Date.now();
            requestAnimationFrame(gameLoop);
            return;
        }
        
        if (gameState === 'playing') {
            isPressing = true;
            if (!player.isJumping) {
                player.isJumping = true;
                player.vy = player.jumpPower;
                player.jumpHoldTimer = player.maxJumpHold;
            }
        }
    }

    function pressEnd(e) {
        if (e.type === 'touchend') e.preventDefault();
        isPressing = false;
        player.jumpHoldTimer = 0;
    }

    canvas.addEventListener('touchstart', pressStart, {passive: false});
    canvas.addEventListener('touchend', pressEnd, {passive: false});
    canvas.addEventListener('mousedown', pressStart);
    canvas.addEventListener('mouseup', pressEnd);

    // 物件類別
    class Obstacle {
        constructor() {
            this.width = 80;
            this.height = 100;
            this.x = WIDTH + 100;
            this.y = GROUND_Y;
        }
        update() { this.x -= gameSpeed; }
        draw() {
            if (obstacleImg.complete) {
                ctx.drawImage(obstacleImg, this.x, this.y - this.height, this.width, this.height);
            } else {
                ctx.fillStyle = '#ff2a2a';
                ctx.fillRect(this.x, this.y - this.height, this.width, this.height);
            }
        }
    }

    class Coin {
        constructor() {
            this.size = 40;
            this.x = WIDTH + 100;
            const heights = [GROUND_Y - 50, GROUND_Y - 180, GROUND_Y - 290];
            this.y = heights[Math.floor(Math.random() * heights.length)];
            this.angle = Math.random() * Math.PI;
        }
        update() {
            this.x -= gameSpeed;
            this.angle += 0.08;
        }
        draw() {
            if (coinImg.complete) {
                ctx.drawImage(coinImg, this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            } else {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FFD700';
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size / 2 * Math.sin(this.angle), this.size / 2, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8 - 4;
            this.size = Math.random() * 6 + 3;
            this.color = color;
            this.life = 1.0;
            this.decay = Math.random() * 0.03 + 0.02;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.2;
            this.life -= this.decay;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    // 遊戲主循環
    function gameLoop() {
        if (gameState !== 'playing') return;

        frames++;
        gameTime = (Date.now() - startTime) / 1000;
        timerEl.innerText = gameTime.toFixed(1);
        gameSpeed = Math.min(baseSpeed + (gameTime / 8) * 1.2, 18);

        bgStars.forEach(star => star.update());
        player.update();

        // 生成障礙物與金幣
        let spawnInterval = Math.max(65, 120 - Math.floor(gameSpeed * 2.5));
        if (frames % spawnInterval === 0) {
            obstacles.push(new Obstacle());
            if (Math.random() < 0.7) coins.push(new Coin());
        }

        // 更新與碰撞
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.update();
            if (player.x + HITBOX_SHRINK < obs.x + obs.width - 10 &&
                player.x + player.width - HITBOX_SHRINK > obs.x + 10 &&
                player.y - player.height + HITBOX_SHRINK < obs.y &&
                player.y > obs.y - obs.height + 10) {
                triggerGameOver();
            }
            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            let coin = coins[i];
            coin.update();
            if (player.x < coin.x + coin.size &&
                player.x + player.width > coin.x - coin.size &&
                player.y - player.height < coin.y + coin.size &&
                player.y > coin.y - coin.size) {
                score += 1;
                scoreEl.innerText = score;
                for (let p = 0; p < 8; p++) particles.push(new Particle(coin.x, coin.y, '#FFD700'));
                coins.splice(i, 1);
            } else if (coin.x + coin.size < 0) {
                coins.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        renderScene();
        requestAnimationFrame(gameLoop);
    }

    function renderScene() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // 背景
        if (bgImage.complete) {
            ctx.drawImage(bgImage, 0, 0, WIDTH, HEIGHT - GROUND_H + 50);
        }

        bgStars.forEach(star => star.draw());

        // 地面
        if (groundTile.complete) {
            let offset = (frames * gameSpeed) % 120;
            for (let i = -120; i < WIDTH + 240; i += 120) {
                ctx.drawImage(groundTile, i - offset, GROUND_Y, 120, GROUND_H);
            }
        } else {
            ctx.fillStyle = '#1B5E20';
            ctx.fillRect(0, GROUND_Y, WIDTH, GROUND_H);
        }

        coins.forEach(coin => coin.draw());
        obstacles.forEach(obs => obs.draw());
        player.draw();
        particles.forEach(p => p.draw());
    }

    function triggerGameOver() {
        gameState = 'gameover';
        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalTime').innerText = gameTime.toFixed(1);
        popup.style.display = 'flex';
        
        for (let p = 0; p < 25; p++) {
            particles.push(new Particle(player.x + player.width/2, player.y - player.height/2, '#FF5722'));
        }
        renderScene();
        generateAIComment(score, gameTime.toFixed(1));
    }

    async function generateAIComment(finalScore, finalTime) {
        aiCommentEl.innerText = "✨ AI 正在思考評語...";
        // Gemini API 部分保留原樣（若不需要可移除）
        aiCommentEl.innerText = `✨ 你堅持了 ${finalTime} 秒，收集了 ${finalScore} 枚金幣！下次再挑戰看看！`;
    }

    function resetGame() {
        popup.style.display = 'none';
        player.y = GROUND_Y;
        player.vy = 0;
        player.isJumping = false;
        obstacles = [];
        coins = [];
        particles = [];
        score = 0;
        scoreEl.innerText = '0';
        gameState = 'ready';
        startPrompt.style.display = 'block';
    }

    btnRestart.addEventListener('click', resetGame);

    // 初始渲染
    renderScene();
</script>
</body>
</html>
