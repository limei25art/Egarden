    // ================= 彈幕資源定義 =================

    const danmakuTexts = [
        "呂爵安世界第一",

        "你與真相恐怕差百千萬里",

        "傻西瓜(╯°Д°）╯︵ /(.□ . \)🍉",

    ];

    // ================= 載入核心圖片 =================
    let playerSheet = new Image();
    let coinImg = new Image();
    
    let layer1Img = new Image(); 
    let layer2Img = new Image(); 
    let layer3Img = new Image(); 
    let layer4Img = new Image(); 
    let layer5Img = new Image(); 
    let eggImg = new Image(); 

    let obstacleImgs = [new Image(), new Image(), new Image()];

    let imagesLoaded = 0;

    function checkAllLoaded() {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
            console.log("✅ 所有遊戲圖片載入完成");
            if (gameState === 'ready') renderScene();

    }

    playerSheet.src = "assets/sora_spritesheet.png";   
    coinImg.src = "assets/coin.png";             
    obstacleImgs[0].src = "assets/obstacle_1.png"; 
    obstacleImgs[1].src = "assets/obstacle_2.png"; 
    obstacleImgs[2].src = "assets/obstacle_3.png"; 

    layer1Img.src = "assets/layer1.png"; 
    layer2Img.src = "assets/layer2.png"; 
    layer3Img.src = "assets/layer3.png"; 
    layer4Img.src = "assets/layer4.png"; 
    layer5Img.src = "assets/layer5.png";
    eggImg.src = "assets/egg.png"; 

    playerSheet.onload = checkAllLoaded;
    coinImg.onload = checkAllLoaded;
    obstacleImgs.forEach(img => img.onload = checkAllLoaded);
    layer1Img.onload = checkAllLoaded;
    layer2Img.onload = checkAllLoaded;
    layer3Img.onload = checkAllLoaded;
    layer4Img.onload = checkAllLoaded;
    layer5Img.onload = checkAllLoaded;
    eggImg.onload = checkAllLoaded;

    const resultTiers = [
        { min: 0, max: 0, title: "🍂 空手而回 🍂", img: "assets/result_0.png", comment: "哇！一個花花都冇？你嚟散步啊？耶耶！." },
        { min: 1, max: 10, title: "🥉 初試身手 🥉", img: "assets/result_1.png", comment: "仆... 唔係，仆親之後仲可以翻身！加油耶耶！" },
        { min: 11, max: 59, title: "🥈 尋寶能手 🥈", img: "assets/result_2.png", comment: "好耶耶！開始有feel喇！繼續耶耶！！" },
        { min: 60, max: 79, title: "🥇 花花收割者 🥇", img: "assets/result_3.png", comment: "唔錯唔錯！開始跟到我節奏咁叻仔耶耶！" },
        { min: 80, max: 109, title: "💎 大富大貴 💎", img: "assets/result_4.png", comment: "太犀利啦大佬耶耶！你係咪偷偷練過㗎？！" },
        { min: 110, max: 130, title: "👑 富可敵國 👑", img: "assets/result_5.png", comment: "哇！身手敏捷到我眼花耶耶！！" },
        { min: 131, max: Infinity, title: "✨ 傳奇終結者 ✨", img: "assets/result_6.png", comment: "Sooo Crazyyyyy 去到E個分數，你十分之有耐性耶耶！" }
    ];

    let isPressing = false;

    // ================= 彩蛋狀態變數 =================
let isEggActive = false;   
let eggX = -9999;          
const EGG_WIDTH = 1440;    
const EGG_HEIGHT = 292;  
let nextEggScore = 121;    // 預設第一次出現的分數 (你可以隨意更改起點)

    // ================= 角色屬性與動畫切片 =================
    const player = {
        x: 100, 
        y: GROUND_Y, 
        width: 132,    
        height: 200,   
        vy: 0, 
        gravity: 1.3,      
        jumpPower: -26,    
        isJumping: false, 
        animFrame: 0, animTimer: 0, state: 'RUN',

        update: function() {
            this.vy += this.gravity;
            
            if (!isPressing && this.vy < -5) {
                this.vy += 2.8; 
            }

            this.y += this.vy;

            if (this.y >= GROUND_Y) {
                this.y = GROUND_Y; this.vy = 0;
                if (this.isJumping) {
                    this.isJumping = false; this.state = 'LAND';
                    this.animFrame = 0; this.animTimer = 0;
                }
            }

            if (!this.isJumping) {
                if (this.state === 'LAND') {
                    this.animTimer += 0.3;
                    if (this.animTimer >= 1) { this.state = 'RUN'; this.animTimer = 0; }
                } else {
                    this.state = 'RUN';
                    this.animTimer += (gameSpeed * 0.02);
                    this.animFrame = Math.floor(this.animTimer) % 8;
                }
            } else {
                this.state = this.vy < 0 ? 'JUMP_UP' : 'FALL';
            }
        },

        draw: function() {
            if (!playerSheet.complete) {
                ctx.save(); ctx.fillStyle = '#FF9800';
                ctx.beginPath(); ctx.roundRect(this.x, this.y - this.height, this.width, this.height, 15);
                ctx.fill(); ctx.restore(); return;
            }
            
            let sx = 0, sy = 0, sw = 132, sh = 200; 
            
            if (this.state === 'RUN') {
                sx = this.animFrame * 132;
                sy = 0;
            } else if (this.state === 'JUMP_UP') {
                sx = 0; sy = 200;
            } else if (this.state === 'FALL') {
                sx = 132; sy = 200;
            } else if (this.state === 'LAND') {
                sx = 264; sy = 200;
            } else {
                sx = 396; sy = 200;
            }
            
            ctx.drawImage(playerSheet, sx, sy, sw, sh, this.x, this.y - this.height, this.width, this.height);
        }
    };

    class StarBg {
        constructor() {
            this.x = Math.random() * WIDTH;
            this.y = Math.random() * (HEIGHT - GROUND_H - 200);
            this.size = Math.random() * 3 + 1;
            this.speed = Math.random() * 0.5 + 0.1;
        }
        update() { this.x -= this.speed; if (this.x < -10) this.x = WIDTH + 10; }
        draw(targetCtx) {
            targetCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            targetCtx.fillRect(this.x, this.y, this.size, this.size);
        }
    }
    let bgStars = Array.from({length: 40}, () => new StarBg());

    function pressStart(e) {
        if (e.target.closest('#footer') || e.target.closest('#popup')) return;
        if (e.type === 'touchstart') e.preventDefault();
        
        if (gameState === 'ready') {
            gameState = 'playing'; startPrompt.style.display = 'none';
            startTime = Date.now(); requestAnimationFrame(gameLoop); return;
        }
        
        if (gameState === 'playing') {
            isPressing = true;
            if (!player.isJumping) {
                player.isJumping = true; 
                player.vy = player.jumpPower; 
            }
        }
    }
    function pressEnd(e) {
        if (e.target.closest('#footer') || e.target.closest('#popup')) return;
        if (e.type === 'touchend') e.preventDefault();
        isPressing = false; 
    }
    gameContainer.addEventListener('touchstart', pressStart, {passive: false});
    gameContainer.addEventListener('touchend', pressEnd, {passive: false});
    gameContainer.addEventListener('mousedown', pressStart);
    gameContainer.addEventListener('mouseup', pressEnd);

    class Obstacle {
        constructor() {
            this.imgType = Math.floor(Math.random() * 3);
            // 1. 將障礙物本身的基礎高度降低 (例如從 100 改為 70)
this.width = 80; this.height = 100;
this.x = WIDTH + 100; 
this.y = GROUND_Y;

// 2. 降低障礙物懸浮的最大高度限制，從 150 大幅降至 60，並減緩浮空上升的倍率
let maxElevation = Math.min((gameTime / 10) * 15, 60);
            if (gameTime > 5 && Math.random() < 0.4 + (gameTime * 0.005)) {
                this.y -= Math.random() * maxElevation;
            }
        }
        update() { this.x -= gameSpeed; }
        draw() {
            let img = obstacleImgs[this.imgType];
            if (img.complete) {
                ctx.drawImage(img, this.x, this.y - this.height, this.width, this.height);
            } else {
                ctx.fillStyle = '#ff2a2a'; ctx.fillRect(this.x, this.y - this.height, this.width, this.height);
            }
        }
    }

    class Coin {
        constructor(x, y) {
            this.size = 40; 
            this.x = x; 
            this.y = y;
            this.angle = Math.random() * Math.PI;
        }
        update() { this.x -= gameSpeed; this.angle += 0.08; }
        draw() {
            if (coinImg.complete) {
                ctx.drawImage(coinImg, this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            } else {
                ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#FFD700'; ctx.fillStyle = '#FFD700';
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.size / 2 * Math.sin(this.angle), this.size / 2, 0, 0, Math.PI * 2);
                ctx.fill(); ctx.restore();
            }
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 8; this.vy = (Math.random() - 0.5) * 8 - 4;
            this.size = Math.random() * 6 + 3; this.color = color;
            this.life = 1.0; this.decay = Math.random() * 0.03 + 0.02;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= this.decay; }
        draw() {
            ctx.fillStyle = this.color; ctx.globalAlpha = this.life;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill(); ctx.globalAlpha = 1.0;
        }
    }

    function spawnDanmaku() {
        let maxDanmakuAllowed = score >= 60 ? 3 : (score >= 40 ? 2 : 1);
        if (danmakus.length >= maxDanmakuAllowed) return;

        let currentTexts = danmakus.map(d => d.text);
        let availableTexts = danmakuTexts.filter(t => !currentTexts.includes(t));
        if (availableTexts.length === 0) return;

        let currentLanes = danmakus.map(d => d.lane);
        let availableLanes = [0, 1, 2].filter(l => !currentLanes.includes(l));
        if (availableLanes.length === 0) return;

        let selectedText = availableTexts[Math.floor(Math.random() * availableTexts.length)];
        let selectedLane = availableLanes[Math.floor(Math.random() * availableLanes.length)];

        ctx.save();
        ctx.font = "bold 28px 'Segoe UI', sans-serif";
        let textWidth = ctx.measureText(selectedText).width;
        ctx.restore();

        danmakus.push({
            text: selectedText,
            x: WIDTH + 30,
            y: 680 + selectedLane * 75, 
            lane: selectedLane,
            width: textWidth,
            speed: gameSpeed * (0.3 + Math.random() * 0.3)
        });
    }

    function triggerCSSScorePopup(canvasX, canvasY) {
        const scaleX = gameContainer.clientWidth / WIDTH;
        const scaleY = gameContainer.clientHeight / HEIGHT;
        const floatEl = document.createElement('div');
        floatEl.className = 'score-popup'; floatEl.innerText = '+1';
        floatEl.style.left = (canvasX * scaleX) + 'px'; floatEl.style.top = (canvasY * scaleY) + 'px';
        gameContainer.appendChild(floatEl);
        scoreEl.classList.remove('pop-anim'); void scoreEl.offsetWidth; scoreEl.classList.add('pop-anim');
        setTimeout(() => floatEl.remove(), 800);
    }

    function gameLoop() {
        if (gameState !== 'playing') return;

        frames++;
        gameTime = (Date.now() - startTime) / 1000;
        timerEl.innerText = gameTime.toFixed(1);
        gameSpeed = Math.min(baseSpeed + (gameTime / 10) * 1.1, 19);

        bgStars.forEach(star => star.update());
        player.update();

        // 當分數達到目標，而且畫面中目前沒有彩蛋時，就召喚彩蛋
if (score >= nextEggScore && !isEggActive) {
    isEggActive = true;
    eggX = WIDTH; 
    nextEggScore += 80; // 設定下一次出現的目標分數 (+80)
}

if (isEggActive) {
    eggX -= gameSpeed * 0.6; 
    if (eggX + EGG_WIDTH < 0) {
        isEggActive = false; 
    }
}

        if (score >= 20) {
            for (let i = danmakus.length - 1; i >= 0; i--) {
                danmakus[i].x -= danmakus[i].speed;
                if (danmakus[i].x + danmakus[i].width < 0) {
                    danmakus.splice(i, 1);
                }
            }
            if (frames % 35 === 0 && Math.random() < (score >= 60 ? 0.8 : 0.4)) {
                spawnDanmaku();
            }
        }

        let spawnInterval = Math.max(55, 120 - Math.floor(gameSpeed * 2.8));
        if (frames % spawnInterval === 0) {
            obstacles.push(new Obstacle());
            
            if (Math.random() < 0.85) {
                let pattern = Math.floor(Math.random() * 4); 
                let heights = [GROUND_Y - 80, GROUND_Y - 160, GROUND_Y - 220];
                
                if (gameTime > 15) {
                    heights.push(GROUND_Y - 280); 
                }

                let baseY = heights[Math.floor(Math.random() * heights.length)];
                let startX = WIDTH + 180 + (Math.random() * 100); 

                if (pattern === 0) {
                    coins.push(new Coin(startX, baseY));
                    coins.push(new Coin(startX + 60, baseY));
                } else if (pattern === 1) {
                    for (let k = 0; k < 4; k++) coins.push(new Coin(startX + k * 55, baseY));
                } else if (pattern === 2) {
                    for (let k = 0; k < 5; k++) {
                        let arcY = baseY - Math.sin((k / 4) * Math.PI) * 120;
                        coins.push(new Coin(startX + k * 50, arcY));
                    }
                } else {
                    let waveAmp = gameTime > 20 ? 120 : 70;
                    for (let k = 0; k < 5; k++) {
                        coins.push(new Coin(startX + k * 55, baseY + (k % 2 === 0 ? 0 : -waveAmp)));
                    }
                }
            }
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i]; obs.update();
            
            if (player.x + HITBOX_SHRINK_X < obs.x + obs.width - OBS_SHRINK_X &&
                player.x + player.width - HITBOX_SHRINK_X > obs.x + OBS_SHRINK_X &&
                player.y - player.height + HITBOX_SHRINK_Y < obs.y &&
                player.y > obs.y - obs.height + OBS_SHRINK_Y) {
                triggerGameOver();
            }
            
            if (obs.x + obs.width < 0) obstacles.splice(i, 1);
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            let coin = coins[i]; coin.update();
            if (player.x < coin.x + coin.size && player.x + player.width > coin.x - coin.size &&
                player.y - player.height < coin.y + coin.size && player.y > coin.y - coin.size) {
                score += 1; scoreEl.innerText = score; triggerCSSScorePopup(coin.x, coin.y);
                for (let p = 0; p < 4; p++) particles.push(new Particle(coin.x, coin.y, '#FFD700'));
                coins.splice(i, 1);
            } else if (coin.x + coin.size < 0) { coins.splice(i, 1); }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); if (particles[i].life <= 0) particles.splice(i, 1);
        }

        renderScene(); requestAnimationFrame(gameLoop);
    }

    function drawParallaxLayer(targetCtx, img, speedMult, yPos, height) {
        if (!img.complete || img.width === 0) return;
        let imgW = img.width; 
        let offset = (frames * gameSpeed * speedMult) % imgW;
        for (let i = -offset; i < WIDTH + imgW; i += imgW) {
            targetCtx.drawImage(img, i, yPos, imgW, height);
        }
    }

    function renderScene() {
        bgCtx.clearRect(0, 0, WIDTH, HEIGHT);
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        if (layer1Img.complete) drawParallaxLayer(bgCtx, layer1Img, 0.1, 0, HEIGHT - GROUND_H + 50);
        else { bgCtx.fillStyle = '#87CEEB'; bgCtx.fillRect(0, 0, WIDTH, HEIGHT); }
        bgStars.forEach(star => star.draw(bgCtx));

        drawParallaxLayer(ctx, layer2Img, 0.3, 0, HEIGHT - GROUND_H + 50);
        
        let l3Height = 292;
        let l3Y = GROUND_Y - l3Height + 50; 
        if (layer3Img.complete && layer3Img.height > 0) {
            drawParallaxLayer(ctx, layer3Img, 0.6, l3Y, l3Height);
        } else {
            drawParallaxLayer(ctx, layer3Img, 0.6, 0, HEIGHT - GROUND_H + 50);
        }

        if (isEggActive && eggImg.complete) {
            ctx.drawImage(eggImg, eggX, l3Y, EGG_WIDTH, EGG_HEIGHT);
        }

        if (score >= 20) {
            ctx.save();
            ctx.font = "bold 28px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            danmakus.forEach(d => {
                ctx.fillText(d.text, d.x, d.y);
            });
            ctx.restore();
        }

        if (layer4Img.complete && layer4Img.width > 0) {
            drawParallaxLayer(ctx, layer4Img, 1.0, GROUND_Y, GROUND_H);
        } else {
            ctx.fillStyle = '#1B5E20'; ctx.fillRect(0, GROUND_Y, WIDTH, GROUND_H);
        }

        coins.forEach(coin => coin.draw());
        obstacles.forEach(obs => obs.draw());
        player.draw();
        particles.forEach(p => p.draw());

        if (layer5Img.complete && layer5Img.width > 0) {
            let fgHeight = 150; 
            drawParallaxLayer(ctx, layer5Img, 1.3, HEIGHT - fgHeight, fgHeight);
        }
    }

    function triggerGameOver() {
        gameState = 'gameover';
        gameContainer.classList.add('shake-anim'); setTimeout(() => gameContainer.classList.remove('shake-anim'), 400);

        let matchedTier = resultTiers[0];
        for (const tier of resultTiers) { if (score >= tier.min && score <= tier.max) { matchedTier = tier; break; } }

        document.getElementById('result-img').src = matchedTier.img;
        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalTime').innerText = gameTime.toFixed(1);
        popup.style.display = 'flex';
        
        for (let p = 0; p < 25; p++) particles.push(new Particle(player.x + player.width/2, player.y - player.height/2, '#FF5722'));
        renderScene(); aiCommentEl.innerText = `✨ ${matchedTier.comment}`;
    }

    function resetGame() {
    popup.style.display = 'none'; player.y = GROUND_Y; player.vy = 0; player.isJumping = false;
    obstacles = []; coins = []; particles = []; danmakus = []; score = 0; scoreEl.innerText = '0';
    frames = 0; gameState = 'ready'; startPrompt.style.display = 'block'; 
    
    isEggActive = false; 
    eggX = -9999; 
    nextEggScore = 121; // 重新開始時，將目標分數重置回第一次出現的分數
    
    renderScene();
}

    btnRestart.addEventListener('click', resetGame);
    renderScene();
</script>
</body>
</html>
